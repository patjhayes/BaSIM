services:
  # Backend Web Service (Python/FastAPI)
  - type: web
    name: basim-backend
    env: python
    buildCommand: "python scripts/download_modflow.py && pip install -r requirements.txt"
    startCommand: "python -m uvicorn src.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend Static Site (Vue/Vite)
  - type: web
    name: basim-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: VITE_API_URL
        fromService:
          type: web
          name: basim-backend
          envVarKey: RENDER_EXTERNAL_URL
        # Optional: Prefix with https:// if you construct the full URL in your frontend
