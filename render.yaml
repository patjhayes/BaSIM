services:
  # Backend Web Service (Python/FastAPI)
  - type: web
    name: basim-backend
    env: python
    buildCommand: "python scripts/download_modflow.py && pip install -r requirements.txt"
    startCommand: "python -m uvicorn src.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: basim-redis
          property: connectionString
      - key: STRIPE_API_KEY
        value: "paste_key_here"
      - key: STRIPE_WEBHOOK_SECRET
        value: "paste_key_here"
      - key: SUPABASE_URL
        value: "paste_key_here"
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "paste_key_here"
      - key: SUPABASE_JWT_SECRET
        value: "paste_key_here"

  # Frontend Static Site (Vue/Vite)
  - type: web
    name: basim-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: VITE_API_URL
        fromService:
          type: web
          name: basim-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SUPABASE_URL
        value: "paste_key_here"
      - key: VITE_SUPABASE_ANON_KEY
        value: "paste_key_here"
        # Optional: Prefix with https:// if you construct the full URL in your frontend

  # Background Worker (Celery)
  - type: worker
    name: basim-compute-worker
    env: python
    buildCommand: "python scripts/download_modflow.py && pip install -r requirements.txt"
    startCommand: "celery -A src.api.worker.celery_app worker --loglevel=info"

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: basim-redis
          property: connectionString
      - key: STRIPE_API_KEY
        value: "paste_key_here"
      - key: STRIPE_WEBHOOK_SECRET
        value: "paste_key_here"
      - key: SUPABASE_URL
        value: "paste_key_here"
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "paste_key_here"
      - key: SUPABASE_JWT_SECRET
        value: "paste_key_here"

  # Redis Broker
  - type: redis
    name: basim-redis
    ipAllowList: []
